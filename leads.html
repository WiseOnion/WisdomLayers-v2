  { name: "CCF Materials", category: "Concrete", phone: "(910) 848-0402", address: "570 Hobson Rd, Raeford, NC 28376", fb: "https://www.facebook.com/ccfmaterials/", opportunity: "No Website", status: "New", notes: "Active Facebook, no full website. Concrete contractor in Raeford." },
  { name: "RLC Riverside Landscape & Concrete LLC", category: "Concrete", phone: "(910) 920-6672", address: "6168 Jake Rd, Stedman, NC 28391", fb: "https://www.facebook.com/RiversideLandscapeCO/", opportunity: "Bad Website - Facebook-first, basic site", status: "New", notes: "Serves Fayetteville, Hope Mills, Raeford, Spring Lake, Dunn. Landscaping, concrete, hardscape. Email: Riversidelandscape1@gmail.com" },
  { name: "KBT Custom Masonry & Landscape Design", category: "Concrete", phone: "(910) 436-0712", address: "25 Purvis Lane, Cameron, NC 28308", fb: "", opportunity: "Bad Website - basic site", status: "New", notes: "Veteran-owned. Retaining walls, driveways, patios, walkways, pavers, block, stone, brick. Serves Cumberland and Harnett counties." },
];

const statusColors = { New: "status-new", Contacted: "status-contacted", Closed: "status-closed", Dead: "status-dead" };
const categoryColors = {
  Barber: "badge-barber", Salon: "badge-salon", Cleaning: "badge-cleaning",
  Detailing: "badge-detailing", Towing: "badge-towing", Food: "badge-food",
  Lash: "badge-lash", Braiding: "badge-braiding", Fitness: "badge-fitness",
  Photo: "badge-photo", Handyman: "badge-handyman", Moving: "badge-moving",
  Boutique: "badge-boutique", Repair: "badge-repair", DJ: "badge-dj",
  Trucking: "badge-trucking", Security: "badge-security", Tattoo: "badge-tattoo",
  Lawn: "badge-lawn", Catering: "badge-catering", Concrete: "badge-concrete"
};

let activeFilter = "all";
let searchTerm = "";

function oppBadge(opp) {
  if (!opp || opp === "No Website") return '<span class="badge badge-opp-none">No Website</span>';
  return `<span class="badge badge-opp-bad" title="${opp}">Bad Website</span>`;
}

function renderTable() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";
  let idx = 0;
  leads.forEach((lead, i) => {
    const isBadWeb = lead.opportunity && lead.opportunity.startsWith("Bad Website");
    const isNoWeb = !lead.opportunity || lead.opportunity === "No Website";
    const matchFilter =
      activeFilter === "all" ||
      lead.category === activeFilter ||
      (activeFilter === "__no_website__" && isNoWeb) ||
      (activeFilter === "__bad_website__" && isBadWeb);
    const matchSearch = !searchTerm ||
      lead.name.toLowerCase().includes(searchTerm) ||
      lead.category.toLowerCase().includes(searchTerm) ||
      lead.phone.includes(searchTerm) ||
      lead.address.toLowerCase().includes(searchTerm) ||
      (lead.opportunity || "").toLowerCase().includes(searchTerm) ||
      lead.notes.toLowerCase().includes(searchTerm);
    if (!matchFilter || !matchSearch) return;
    idx++;
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${idx}</td>
      <td><strong>${lead.name}</strong></td>
      <td><span class="badge ${categoryColors[lead.category] || ''}">${lead.category}</span></td>
      <td>${oppBadge(lead.opportunity)}</td>
      <td>${lead.phone || '<span style="color:#555">—</span>'}</td>
      <td style="font-size:0.8rem;color:#999">${lead.address}</td>
      <td>${lead.fb ? `<a href="${lead.fb}" target="_blank">Facebook</a>` : '<span style="color:#555">—</span>'}</td>
      <td>
        <select data-index="${i}" style="background:#1a1a1a;border:1px solid #333;color:#e0e0e0;padding:0.2rem 0.4rem;border-radius:4px;font-size:0.8rem;">
          <option ${lead.status==='New'?'selected':''}>New</option>
          <option ${lead.status==='Contacted'?'selected':''}>Contacted</option>
          <option ${lead.status==='Closed'?'selected':''}>Closed</option>
          <option ${lead.status==='Dead'?'selected':''}>Dead</option>
        </select>
      </td>
      <td style="font-size:0.8rem;color:#888">${lead.notes || ''}</td>
    `;
    tbody.appendChild(tr);
  });
  updateStats();
  document.querySelectorAll("select[data-index]").forEach(sel => {
    sel.addEventListener("change", e => {
      leads[+e.target.dataset.index].status = e.target.value;
      updateStats();
    });
  });
}

function updateStats() {
  document.getElementById("totalCount").textContent = leads.length;
  document.getElementById("newCount").textContent = leads.filter(l => l.status === "New").length;
  document.getElementById("contactedCount").textContent = leads.filter(l => l.status === "Contacted").length;
  document.getElementById("closedCount").textContent = leads.filter(l => l.status === "Closed").length;
  document.getElementById("noWebCount").textContent = leads.filter(l => !l.opportunity || l.opportunity === "No Website").length;
  document.getElementById("badWebCount").textContent = leads.filter(l => l.opportunity && l.opportunity.startsWith("Bad Website")).length;
}

document.getElementById("filters").addEventListener("click", e => {
  if (e.target.tagName !== "BUTTON") return;
  document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
  e.target.classList.add("active");
  activeFilter = e.target.dataset.filter;
  renderTable();
});

document.getElementById("search").addEventListener("input", e => {
  searchTerm = e.target.value.toLowerCase();
  renderTable();
});

renderTable();
</script>
</body>
</html>
