<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WisdomLayers</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    .scroll-stage { height: 700vh; }

    .scene {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── LAPTOP ── */
    #laptop {
      position: absolute;
      width: 560px;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* laptop lid (screen half) */
    #lid {
      width: 100%;
      background: #1a1a1a;
      border-radius: 14px 14px 0 0;
      border: 3px solid #2a2a2a;
      padding: 10px;
      transform-origin: bottom center;
      /* starts closed flat */
    }

    /* screen bezel */
    #screen-bezel {
      background: #111;
      border-radius: 8px;
      padding: 8px;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* screen content */
    #screen-content {
      width: 100%;
      height: 100%;
      background: #fff;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    /* fake browser bar */
    .browser-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 28px;
      background: #f1f5f9;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 6px;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; }
    .dot.r { background: #fc605b; }
    .dot.y { background: #fdbc40; }
    .dot.g { background: #35cd4b; }
    .url-bar {
      flex: 1;
      height: 16px;
      background: #e2e8f0;
      border-radius: 20px;
      margin-left: 6px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      font-size: 8px;
      color: #64748b;
    }

    /* screen text */
    .screen-headline {
      margin-top: 28px;
      font-size: 15px;
      font-weight: 800;
      color: #0f172a;
      text-align: center;
      line-height: 1.35;
      padding: 0 20px;
    }
    .screen-headline span { color: #0d9488; }

    .screen-sub {
      font-size: 9px;
      color: #94a3b8;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* device mockups on screen */
    .devices {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      margin-top: 4px;
    }
    .dev-desktop {
      width: 60px; height: 40px;
      background: #0d9488;
      border-radius: 3px;
      opacity: 0.15;
    }
    .dev-tablet {
      width: 30px; height: 40px;
      background: #0d9488;
      border-radius: 3px;
      opacity: 0.15;
    }
    .dev-phone {
      width: 18px; height: 36px;
      background: #0d9488;
      border-radius: 3px;
      opacity: 0.15;
    }

    /* click ripple on screen */
    #ripple {
      position: absolute;
      width: 0; height: 0;
      border-radius: 50%;
      background: rgba(13,148,136,0.35);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* laptop base */
    #base {
      width: 100%;
      height: 22px;
      background: linear-gradient(to bottom, #2a2a2a, #1a1a1a);
      border-radius: 0 0 8px 8px;
      border: 3px solid #2a2a2a;
      border-top: none;
      position: relative;
    }
    /* trackpad */
    #base::after {
      content: '';
      position: absolute;
      width: 80px; height: 10px;
      background: #222;
      border: 1px solid #333;
      border-radius: 3px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    /* ── ONION ── */
    #onion {
      position: absolute;
      width: 90px;
      bottom: 118px;
      /* starts off the right edge */
    }

    /* ── POINTER FINGER (SVG overlay on onion) ── */
    #finger {
      position: absolute;
      width: 28px;
      bottom: 200px; /* above onion */
      pointer-events: none;
    }

    /* ── CLICK TEXT ── */
    #click-text {
      position: absolute;
      top: 38%;
      left: 50%;
      transform: translateX(-50%);
      background: #0d9488;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 5px 14px;
      border-radius: 20px;
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── GLOW behind laptop ── */
    .glow {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 200px;
      background: radial-gradient(ellipse, rgba(13,148,136,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* scroll hint */
    #hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #334155;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    #hint .bar {
      width: 1px; height: 38px;
      background: linear-gradient(to bottom, transparent, #0d9488);
      animation: bob 1.5s ease-in-out infinite;
    }
    @keyframes bob {
      0%,100% { opacity:.2; } 50% { opacity:1; }
    }
  </style>
</head>
<body>

<div class="scroll-stage">
  <div class="scene" id="scene">

    <div class="glow"></div>

    <!-- Laptop -->
    <div id="laptop">
      <div id="lid">
        <div id="screen-bezel">
          <div id="screen-content">
            <div class="browser-bar">
              <div class="dot r"></div>
              <div class="dot y"></div>
              <div class="dot g"></div>
              <div class="url-bar">wisdomlayers.com</div>
            </div>
            <p class="screen-headline">We make websites that<br><span>work on all devices.</span></p>
            <p class="screen-sub">Fayetteville, NC · Est. 2024</p>
            <div class="devices">
              <div class="dev-desktop"></div>
              <div class="dev-tablet"></div>
              <div class="dev-phone"></div>
            </div>
            <div id="ripple"></div>
          </div>
        </div>
      </div>
      <div id="base"></div>
    </div>

    <!-- Onion walks in from right -->
    <img id="onion" src="assets/images/brand/Logo.png" alt="WisdomLayers">

    <!-- Pointer finger (shows when onion "presses") -->
    <svg id="finger" viewBox="0 0 28 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- finger shape -->
      <rect x="9" y="20" width="10" height="30" rx="5" fill="#f5c49a" stroke="#d4a57a" stroke-width="1.5"/>
      <rect x="9" y="12" width="10" height="16" rx="5" fill="#f5c49a" stroke="#d4a57a" stroke-width="1.5"/>
      <!-- fingertip highlight -->
      <ellipse cx="14" cy="13" rx="4" ry="3" fill="#fde8cc" opacity="0.6"/>
    </svg>

    <!-- click label -->
    <div id="click-text">Click!</div>

  </div>
</div>

<div id="hint"><span>Scroll</span><div class="bar"></div></div>

<script>
  gsap.registerPlugin(ScrollTrigger);

  // ── Initial states ───────────────────────────────────────────────
  // Laptop: lid starts rotated closed (flat, -90deg around bottom edge)
  gsap.set('#lid',        { rotateX: -90, transformOrigin: 'bottom center', transformPerspective: 800 });
  gsap.set('#laptop',     { autoAlpha: 0, y: 60 });
  gsap.set('#onion',      { x: 700, autoAlpha: 0 });   // off right edge
  gsap.set('#finger',     { autoAlpha: 0, x: 0, y: 0 });
  gsap.set('#click-text', { autoAlpha: 0, scale: 0 });
  gsap.set('#ripple',     { autoAlpha: 0, width: 0, height: 0 });
  gsap.set('.dev-desktop, .dev-tablet, .dev-phone', { autoAlpha: 0, y: 10 });
  gsap.set('.screen-headline, .screen-sub', { autoAlpha: 0, y: 8 });

  // ── Master timeline ──────────────────────────────────────────────
  const tl = gsap.timeline({
    scrollTrigger: {
      trigger: '.scroll-stage',
      start: 'top top',
      end: 'bottom bottom',
      scrub: 1.5,
    },
    defaults: { ease: 'power2.out' }
  });

  // ── Phase 1: Laptop drops in (0 → 0.12) ─────────────────────────
  tl.to('#laptop', { autoAlpha: 1, y: 0, duration: 0.08, ease: 'power3.out' }, 0);

  // ── Phase 2: Lid opens (0.08 → 0.24) ────────────────────────────
  tl.to('#lid', {
    rotateX: 0,
    duration: 0.16,
    ease: 'power2.inOut',
    transformOrigin: 'bottom center',
    transformPerspective: 800
  }, 0.08);

  // ── Phase 3: Screen content types in (0.24 → 0.38) ──────────────
  tl.to('.screen-headline', { autoAlpha: 1, y: 0, duration: 0.08 }, 0.26)
    .to('.screen-sub',       { autoAlpha: 1, y: 0, duration: 0.06 }, 0.32)
    .to('.dev-desktop',      { autoAlpha: 0.15, y: 0, duration: 0.05 }, 0.35)
    .to('.dev-tablet',       { autoAlpha: 0.15, y: 0, duration: 0.05 }, 0.37)
    .to('.dev-phone',        { autoAlpha: 0.15, y: 0, duration: 0.05 }, 0.39);

  // ── Phase 4: Onion walks in from right (0.38 → 0.56) ────────────
  tl.to('#onion', { autoAlpha: 1, duration: 0.04 }, 0.38);
  tl.to('#onion', {
    x: -200,   // stops to the right of the laptop
    duration: 0.18,
    ease: 'power1.inOut'
  }, 0.38);

  // little walk bob — up/down while moving
  tl.to('#onion', { y: -12, duration: 0.045, ease: 'power1.out', repeat: 3, yoyo: true }, 0.38);

  // ── Phase 5: Onion leans toward screen (0.56 → 0.64) ────────────
  tl.to('#onion', {
    x: -90,         // closer to screen center
    rotation: 8,    // leaning in
    duration: 0.08,
    ease: 'power2.inOut'
  }, 0.56);

  // ── Phase 6: Finger appears, presses screen (0.62 → 0.74) ───────
  // finger starts at onion's approximate position offset
  tl.to('#finger', { autoAlpha: 1, x: -50, y: -260, duration: 0.04 }, 0.62);
  // finger jabs forward (moves left toward screen)
  tl.to('#finger', { x: 60, y: -220, duration: 0.06, ease: 'power3.in'  }, 0.66)
    .to('#finger', { x: -50, y: -260, duration: 0.05, ease: 'power2.out' }, 0.72);

  // ── Phase 7: Click ripple on screen (0.67) ───────────────────────
  tl.to('#ripple', {
    autoAlpha: 1,
    width: 180, height: 180,
    duration: 0.08,
    ease: 'power1.out'
  }, 0.67);
  tl.to('#ripple', { autoAlpha: 0, duration: 0.06 }, 0.75);

  // click text pops up
  tl.to('#click-text', { autoAlpha: 1, scale: 1, duration: 0.04, ease: 'back.out(2)' }, 0.67)
    .to('#click-text', { autoAlpha: 0, scale: 0.8, duration: 0.05 }, 0.74);

  // screen flashes teal on click
  tl.to('#screen-content', { background: '#e0faf7', duration: 0.03 }, 0.67)
    .to('#screen-content', { background: '#fff', duration: 0.06 }, 0.70);

  // devices highlight on click
  tl.to('.dev-desktop, .dev-tablet, .dev-phone', { autoAlpha: 1, duration: 0.04 }, 0.67)
    .to('.dev-desktop, .dev-tablet, .dev-phone', { autoAlpha: 0.15, duration: 0.08 }, 0.71);

  // ── Phase 8: Onion backs up, happy (0.76 → 0.88) ────────────────
  tl.to('#finger', { autoAlpha: 0, duration: 0.04 }, 0.76);
  tl.to('#onion', {
    x: -200, rotation: 0,
    duration: 0.08, ease: 'power2.out'
  }, 0.76);

  // hop in place
  tl.to('#onion', { y: -50, duration: 0.05, ease: 'power2.out' }, 0.86)
    .to('#onion', { y:   0, duration: 0.08, ease: 'bounce.out' }, 0.91);

  // ── Phase 9: Spin out (0.93 → 1.0) ──────────────────────────────
  tl.to('#onion', { rotation: 360, x: -600, autoAlpha: 0, duration: 0.1, ease: 'power2.in' }, 0.93);

  // hide scroll hint
  ScrollTrigger.create({
    trigger: '.scroll-stage',
    start: 'top+=80 top',
    once: true,
    onEnter: () => gsap.to('#hint', { autoAlpha: 0, duration: 0.4 })
  });
</script>
</body>
</html>
